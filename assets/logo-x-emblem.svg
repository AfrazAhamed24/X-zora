<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="X emblem">
  <defs>
    <linearGradient id="armLeft" x1="200" y1="180" x2="810" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6a1f2c"/>
      <stop offset="0.38" stop-color="#9b3a48"/>
      <stop offset="0.7" stop-color="#b6725b"/>
      <stop offset="1" stop-color="#e5c39d"/>
    </linearGradient>
    <linearGradient id="armRight" x1="830" y1="180" x2="210" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4d8b8"/>
      <stop offset="0.36" stop-color="#c39164"/>
      <stop offset="0.72" stop-color="#8a603d"/>
      <stop offset="1" stop-color="#5f4028"/>
    </linearGradient>
    <linearGradient id="bevelLeft" x1="250" y1="210" x2="770" y2="810" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffead2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffead2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bevelRight" x1="780" y1="210" x2="250" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff0df" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#fff0df" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff8ee"/>
      <stop offset="0.36" stop-color="#ffdcae"/>
      <stop offset="1" stop-color="#ffcb84" stop-opacity="0"/>
    </radialGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0d0705" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#ffd19a" flood-opacity="0.42"/>
    </filter>
    <filter id="flareGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <g filter="url(#logoGlow)">
    <path d="M210 180 L814 844" fill="none" stroke="url(#armLeft)" stroke-width="228" stroke-linecap="round"/>
    <path d="M814 180 L210 844" fill="none" stroke="url(#armRight)" stroke-width="228" stroke-linecap="round"/>

    <path d="M210 180 L814 844" fill="none" stroke="rgba(46,23,16,.38)" stroke-width="74" stroke-linecap="round"/>
    <path d="M814 180 L210 844" fill="none" stroke="rgba(46,23,16,.36)" stroke-width="74" stroke-linecap="round"/>

    <path d="M238 198 L790 826" fill="none" stroke="url(#bevelLeft)" stroke-width="24" stroke-linecap="round"/>
    <path d="M790 198 L238 826" fill="none" stroke="url(#bevelRight)" stroke-width="24" stroke-linecap="round"/>
  </g>

  <g>
    <circle cx="512" cy="512" r="128" fill="url(#core)"/>
    <rect x="430" y="507" width="164" height="10" rx="5" fill="#fff4e2" fill-opacity="0.85" filter="url(#flareGlow)"/>
    <rect x="507" y="430" width="10" height="164" rx="5" fill="#fff4e2" fill-opacity="0.85" filter="url(#flareGlow)"/>
  </g>
</svg>
